<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sketch Detector</title>
  </head>
  <body class="h-screen w-screen overflow-hidden bg-gray-950 text-white">
    <div id="app" class="flex h-full flex-col">
      <header class="flex items-center gap-2 border-b border-gray-800 px-4 py-2">
        <h1 class="mr-auto text-lg font-bold">Sketch Detector</h1>
        <button
          id="btn-clear"
          class="rounded bg-gray-800 px-3 py-1 text-sm hover:bg-gray-700"
        >
          Clear
        </button>
        <button
          id="btn-export"
          class="rounded bg-gray-800 px-3 py-1 text-sm hover:bg-gray-700"
        >
          Export
        </button>
      </header>

      <main class="flex min-h-0 flex-1">
        <!-- Left half: square drawing canvas -->
        <div class="flex items-center justify-center w-1/2 p-4">
          <div class="aspect-square h-full max-w-full relative rounded-lg border border-gray-800 overflow-hidden">
            <canvas id="drawing-canvas" class="absolute inset-0 h-full w-full touch-none"></canvas>
          </div>
        </div>

        <!-- Right half: preview + predictions -->
        <div class="flex w-1/2 flex-col">
          <!-- Top-right: debug preview -->
          <div id="debug-preview" class="flex-1 flex-col items-center justify-center border-b border-gray-800 p-4 hidden">
            <p class="mb-2 text-xs text-gray-500">Model input (28x28)</p>
            <canvas id="debug-canvas" width="28" height="28" class="h-32 w-32 rounded border border-gray-700" style="image-rendering:pixelated"></canvas>
          </div>

          <!-- Bottom-right: predictions -->
          <div class="flex flex-1 flex-col p-4">
            <p id="model-status" class="text-sm text-gray-400">Loading model…</p>
            <ul id="prediction-list" class="mt-3 hidden space-y-2.5 text-base"></ul>
            <div id="score-display" class="mt-4 hidden">
              <p class="text-xs text-gray-500">Semantic score</p>
              <div class="mt-1 flex items-center gap-3">
                <div class="relative h-3 flex-1 overflow-hidden rounded-full bg-gray-700">
                  <div id="score-bar" class="absolute inset-y-0 left-0 rounded-full bg-amber-500 transition-all duration-300" style="width:0%"></div>
                </div>
                <span id="score-value" class="w-12 text-right tabular-nums text-sm font-medium text-amber-400">0.00</span>
              </div>
              <p id="score-target" class="mt-1 text-xs text-gray-500"></p>
            </div>
          </div>
        </div>
      </main>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
