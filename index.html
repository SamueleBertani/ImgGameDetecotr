<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sketch Detector</title>
  </head>
  <body class="h-screen w-screen overflow-hidden bg-gray-950 text-white">
    <div id="app" class="flex h-full flex-col">
      <header class="flex items-center gap-2 border-b border-gray-800 px-4 py-2">
        <h1 class="mr-auto text-lg font-bold">Sketch Detector</h1>
        <button
          id="btn-clear"
          class="rounded bg-gray-800 px-3 py-1 text-sm hover:bg-gray-700"
        >
          Clear
        </button>
        <button
          id="btn-export"
          class="rounded bg-gray-800 px-3 py-1 text-sm hover:bg-gray-700"
        >
          Export
        </button>
      </header>
      <main class="relative flex-1">
        <canvas id="drawing-canvas" class="absolute inset-0 h-full w-full touch-none"></canvas>
        <aside
          id="predictions"
          class="pointer-events-none absolute right-3 top-3 w-56 rounded-lg bg-gray-900/80 p-3 backdrop-blur"
        >
          <p id="model-status" class="text-sm text-gray-400">Loading model…</p>
          <ul id="prediction-list" class="mt-2 hidden space-y-1.5"></ul>
          <div id="debug-preview" class="mt-3 hidden">
            <p class="mb-1 text-xs text-gray-500">Model input (28x28)</p>
            <canvas id="debug-canvas" width="28" height="28" class="h-14 w-14 rounded border border-gray-700" style="image-rendering:pixelated"></canvas>
          </div>
        </aside>
      </main>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
