<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Draw and let the AI guess — Sketch Detector scores your sketch with a neural net and semantic similarity (GloVe + Numberbatch)." />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Sketch Detector" />
    <meta property="og:description" content="Draw and let the AI guess — a sketch game scored with a neural net and semantic similarity." />
    <meta property="og:image" content="/og-image.svg" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Sketch Detector" />
    <meta name="twitter:description" content="Draw and let the AI guess — a sketch game scored with a neural net and semantic similarity." />
    <meta name="twitter:image" content="/og-image.svg" />
    <title>Sketch Detector</title>
  </head>
  <body class="h-screen w-screen overflow-hidden bg-gray-950 text-white">
    <div id="app" class="flex h-full flex-col">
      <header class="flex items-center gap-2 border-b border-gray-800 px-4 py-2">
        <h1 class="mr-auto text-lg font-bold">Sketch Detector</h1>
        <label class="flex items-center gap-1.5 text-sm text-gray-400">
          <input id="toggle-distance" type="checkbox" class="accent-amber-500" checked />
          Distance
        </label>
        <label class="flex items-center gap-1.5 text-sm text-gray-400">
          <input id="toggle-target" type="checkbox" class="accent-amber-500" />
          Target
        </label>
        <button
          id="btn-help"
          class="rounded bg-gray-800 px-2.5 py-1 text-sm hover:bg-gray-700"
          aria-label="Help"
        >
          ?
        </button>
        <button
          id="btn-new-word"
          class="rounded bg-amber-600 px-3 py-1 text-sm font-medium hover:bg-amber-500"
        >
          New Word
        </button>
        <button
          id="btn-clear"
          class="rounded bg-gray-800 px-3 py-1 text-sm hover:bg-gray-700"
        >
          Clear
        </button>
        <button
          id="btn-export"
          class="rounded bg-gray-800 px-3 py-1 text-sm hover:bg-gray-700"
        >
          Export
        </button>
      </header>

      <main class="flex min-h-0 flex-1">
        <!-- Left half: square drawing canvas -->
        <div class="flex items-center justify-center w-1/2 p-4">
          <div class="aspect-square h-full max-w-full relative rounded-lg border border-gray-800 overflow-hidden">
            <canvas id="drawing-canvas" class="absolute inset-0 h-full w-full touch-none"></canvas>
          </div>
        </div>

        <!-- Right half: preview + predictions -->
        <div class="flex w-1/2 flex-col">
          <!-- Top-right: debug preview -->
          <div id="debug-preview" class="basis-1/4 shrink-0 flex-col items-center justify-center border-b border-gray-800 p-4 hidden">
            <p class="mb-2 text-xs text-gray-500">Model input (28x28)</p>
            <canvas id="debug-canvas" width="28" height="28" class="h-32 w-32 rounded border border-gray-700" style="image-rendering:pixelated"></canvas>
          </div>

          <!-- Bottom-right: predictions -->
          <div class="flex flex-1 flex-col p-4">
            <p id="model-status" class="text-sm text-gray-400">Loading model…</p>
            <ul id="prediction-list" class="mt-3 hidden space-y-4 text-base"></ul>
            <div id="score-display" class="mt-4 hidden">
              <p class="text-xs text-gray-500">GloVe</p>
              <div class="mt-1 flex items-center gap-3">
                <div class="relative h-3 flex-1 overflow-hidden rounded-full bg-gray-700">
                  <div id="score-bar" class="absolute inset-y-0 left-0 rounded-full bg-amber-500 transition-all duration-300" style="width:0%"></div>
                </div>
                <span id="score-value" class="w-12 text-right tabular-nums text-sm font-medium text-amber-400">0.00</span>
              </div>
            </div>
            <div id="score-display-nb" class="mt-2 hidden">
              <p class="text-xs text-gray-500">Numberbatch</p>
              <div class="mt-1 flex items-center gap-3">
                <div class="relative h-3 flex-1 overflow-hidden rounded-full bg-gray-700">
                  <div id="score-bar-nb" class="absolute inset-y-0 left-0 rounded-full bg-cyan-500 transition-all duration-300" style="width:0%"></div>
                </div>
                <span id="score-value-nb" class="w-12 text-right tabular-nums text-sm font-medium text-cyan-400">0.00</span>
              </div>
            </div>
            <p id="score-target" class="mt-2 text-xs text-gray-500 hidden"></p>
          </div>
        </div>
      </main>
    </div>

    <div
      id="win-modal"
      class="fixed inset-0 z-50 hidden items-center justify-center bg-black/70 backdrop-blur-sm"
    >
      <div class="mx-4 w-full max-w-sm rounded-lg border border-amber-500/40 bg-gray-900 p-6 text-center shadow-2xl">
        <h2 class="text-2xl font-bold text-amber-400">You win!</h2>
        <p id="win-word" class="mt-3 text-gray-200"></p>
        <p id="win-time" class="mt-1 text-sm text-gray-500"></p>
        <div class="mt-5 flex justify-center gap-2">
          <button
            id="win-new-word"
            class="rounded bg-amber-600 px-4 py-2 text-sm font-medium hover:bg-amber-500"
          >
            New word
          </button>
          <button
            id="win-close"
            class="rounded bg-gray-800 px-4 py-2 text-sm hover:bg-gray-700"
          >
            Close
          </button>
        </div>
      </div>
    </div>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
